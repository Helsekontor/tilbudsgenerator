function buildMailText(s, n, sel, total) {
  const pakke = NAMES[sel];
  const modul = MODUL[sel];
  const pris  = kr(total);
  const perLege = kr(Math.round(total/n));
  const svarfrist = s.svarfrist || '1 måned';
  const opptrappingLinje = s.opptrapping
    ? `\nMerk: Avtalen starter med ${NAMES[s.opptrappingPakke]} i ${s.opptrappingMnd} måneder (${kr(TOT[s.opptrappingPakke][n])}/mnd), og trapper opp til ${pakke} fra måned ${s.opptrappingMnd + 1}.`
    : '';
  const spesieltLinje = s.spesielt ? `\nSpesielle vilkår: ${s.spesielt}` : '';

  return `Hei ${s.kontakt || ''},

Takk for interessen for Helsekontor Forvaltning AS. Som avtalt sender vi over vårt tilbud.

Tilbud til: ${s.kunde || '—'}
Løsning: ${pakke} (${modul})

Pris per lege: ${perLege}/mnd${opptrappingLinje}${spesieltLinje}

Svarfrist: innen ${svarfrist}

Vi tilpasser gjerne løsningen etter behovet deres. Ta gjerne kontakt om du har spørsmål.

Med vennlig hilsen
${s.kontakt || 'Mikkel Øwre'}
Helsekontor Forvaltning AS
Brynsveien 12, 0667 Oslo
${s.epost || 'post@helsekontor.no'} | ${s.telefon || '+47 94 00 20 44'}`;
}

  const idx={drift:0,okonomi:1,komplett:2}[sel];
  return(
    <div className="hkf-page" style={{width:560,height:793,background:'#fff',position:'relative',

                'Oppdragsgiver står også for alle utgifter knyttet til juridisk hjelp av advokat/advokatfullmektig i alle punkter nevnt under driftsbistand, også det som står under inkludert i avtalen. Dette utgjør ikke en del av fast honorar. Dette vil i så fall skriftlig avtales med Oppdragsgiver.',
              ].map(b=><P key={b}>• {b}</P>)}
            </div>
          </div>
        )}

        {(sel==='okonomi'||sel==='komplett')&&(
          <div className={sel==='komplett'?'':' k-page-break'} style={{marginTop:sel==='komplett'?20:0}}>
            <SH>Vedlegg III: Økonomistyring og regnskap</SH>
            <P><strong>Inkludert i avtalen:</strong></P>
            <P>Forvalter skal ivareta den økonomiske forvaltningen ved å benytte ledende forvaltnings- og regnskapssystemer, noe som innebærer følgende:</P>
            {['Løpende regnskapsførsel med bokføring og lovpålagt årsregnskap med et regnskapsbyrå.',
              'Tett dialog med regnskapsfører og ha etablerte rutiner for å sikre god økonomisk forvaltning av legekontoret.',
              'Utarbeide forslag til budsjett for kostnader en gang pr. år.',
              'Forberede og kalle inn til generalforsamlinger etter behov og i samråd med styret/daglig leder.',
              'Foreste innkjøp av fellestjenester og kostnader årlig.',
              'Betale Legekontorets løpende utgifter inkludert eventuelt renter/avdrag på eksisterende lån.',
              'Utarbeide og vedlikeholde Legekontorets fordelingsnøkler.',
              'Fakturere og kreve inn á-konto innbetalinger fra fastleger og andre aktører for å dekke Legekontorets kostnader i henhold til budsjett samt årlig å avregne disse mot faktisk kostnader i henhold til fordelingsnøkler for leger og andre aktører.',
              'Godkjenning og postering av leverandørfakturaer.',
              'Ha oversikt over alle lønns- og ansettelsesforhold og melde til regnskapsfører.',
              'Ha oversikt over alle typer fravær og melde til regnskapsfører.',
              'Rådgivning og oppfølging av bankforbindelser.',
              'Finansiell rådgivning og rapportering.',
            ].map(b=><P key={b}>• {b}</P>)}

            <div style={{marginTop:14}}>
              <div style={{fontFamily:'Georgia,serif',fontSize:11,fontWeight:700,color:C.ink,marginBottom:6}}>Tilleggstjenester (økonomisk forvaltning)</div>
              <P>Listen over tilleggstjenester/-oppgaver som ikke er en del av avtalens faste honorar kan inkludere men er ikke begrenset til:</P>
              {['Bistand i forbindelse med emisjoner / kapitalnedsettelser / eller andre former for omstrukturering av Oppdragsgivers selskap.',
                'Bistand i forbindelse med låneopptak / refinansiering / reforhandling av eksisterende lån.',
                'Oppdragsgiver står også for alle utgifter knyttet til juridisk hjelp av advokat/advokatfullmektig i alle punkter nevnt under økonomisk forvaltning. Dette utgjør ikke en del av fast honorar.',
                'Uavhengig av om praksisleie avregnes gjennom Helsekontor Forvaltning AS eller i Oppdragsgivers selskap er Oppdragsgiver ansvarlig for: Alle mislighold fra legene og andre aktører på Legekontoret vedrørende betaling av á-konto praksisleie og avregning på utgiftene til drift av gruppepraksis.',
                'Tvister / restanser / uoppgjørte poster vedrørende felles driftsutgifter tilknyttet Legekontoret.',
                'Tvister med leger relatert til kvalitet på leverte varer og tjenester, samt tvister med leverandører.',
                'Midlertidige likviditetsbehov når for eksempel á-felleskostnader er lavere enn faktiske kostnader.',
              ].map(b=><P key={b}>• {b}</P>)}
            </div>
          </div>
        )}

        {/* Vedlegg IV: Timepriser */}
        <div style={{marginTop:20}} className="k-avoid">
          <SH>Vedlegg IV: Avtalte timepriser ekskl. mva</SH>
          <table style={{width:'100%',borderCollapse:'collapse',marginBottom:8}}>
            <thead>
              <tr style={{background:C.hero}}>
                <th style={{...TD,color:'#fff',fontWeight:700,fontSize:8.5}}>Medarbeiderkategori / arbeidsoppgaver</th>
                <th style={{...TD,color:'#fff',fontWeight:700,fontSize:8.5,textAlign:'right'}}>Timepris</th>
              </tr>
            </thead>
            <tbody>
              {[['Hovedforvalter','2 299 kr'],['Forvalter','1 699 kr'],['Driftansvarlig','1 699 kr'],
                ['Regnskapssjef (autorisert el. revisor)','1 899 kr'],['Regnskapsmedarbeider (jr.)','1 499 kr'],
                ['Administrasjonssekretær','1 290 kr'],['Økonomisk rådgivning (finansiering / skatt / mva m.v.)','1 499 kr']
              ].map(([r,p],i)=>(
                <tr key={r} style={{background:i%2===0?'#faf9fc':'#fff'}}>
                  <td style={TD}>{r}</td>
                  <td style={{...TD,textAlign:'right',fontWeight:600}}>{p}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <P style={{fontSize:8,color:C.muted}}>Timepriser justeres årlig iht generell lønnsutvikling.</P>
        </div>

        {/* ══════════════════════════════════
            SLUTTSIDE: SIGNATURER
        ══════════════════════════════════ */}
        <div className="k-page-break">
          <SH>Signaturer</SH>
          <P>Ved signering bekrefter begge parter å ha lest, forstått og akseptert samtlige vilkår i denne avtalen, inkludert arbeidsbeskrivelse, generelle avtalebetingelser, databehandleravtale og vedlegg.</P>
          <div style={{marginTop:16}}>
            <div style={{fontFamily:'system-ui,sans-serif',fontSize:9,fontWeight:700,color:C.muted,marginBottom:10}}>For Oppdragsgiver</div>
            <table style={{width:'100%',borderCollapse:'collapse',marginBottom:24}}>
              <tbody>
                <tr><td style={TDL}>Navn</td><td style={TD}>{s.kontakt||'—'}</td><td style={TDL}>Tittel</td><td style={TD}>Daglig leder</td></tr>
                <tr><td style={TDL}>Firma</td><td style={TD}>{s.kunde||'—'}</td><td style={TDL}>Org.nr</td><td style={TD}>{s.orgnr||'—'}</td></tr>
                <tr><td style={TDL}>Sted og dato</td><td style={{...TD,color:C.muted}}>…………………………</td><td style={TDL}>Signatur</td><td style={{...TD,color:C.muted}}>…………………………</td></tr>
              </tbody>
            </table>
            <div style={{fontFamily:'system-ui,sans-serif',fontSize:9,fontWeight:700,color:C.muted,marginBottom:10}}>For Helsekontor Forvaltning AS</div>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <tbody>
                <tr><td style={TDL}>Navn</td><td style={TD}>Mikkel Øwre</td><td style={TDL}>Tittel</td><td style={TD}>Administrasjonsleder</td></tr>
                <tr><td style={TDL}>Firma</td><td style={TD}>Helsekontor Forvaltning AS</td><td style={TDL}>Org.nr</td><td style={TD}>928 958 426</td></tr>
                <tr><td style={TDL}>Sted og dato</td><td style={{...TD,color:C.muted}}>…………………………</td><td style={TDL}>Signatur</td><td style={{...TD,color:C.muted}}>…………………………</td></tr>
              </tbody>

          </div>
          <div style={{borderTop:`1px solid ${C.lav}`,marginTop:24,paddingTop:10,display:'flex',justifyContent:'space-between'}}>
            <div style={{fontFamily:'system-ui,sans-serif',fontSize:7.5,color:C.muted}}>Helsekontor Forvaltning AS  ·  Org.nr: 928 958 426</div>
            <div style={{fontFamily:'system-ui,sans-serif',fontSize:7.5,color:C.muted}}>www.helsekontor.no</div>

      </div>

}


/* ── App ─────────────────────────────────────────────────────────────── */
function App(){
  const today = new Date().toISOString().slice(0,10);
  const [s, setS] = useState({
    kunde:'', orgnr:'', adresse:'', postnr:'',
    kontakt:'Mikkel Øwre', epost:'mikkel@hkf.no', telefon:'+47 94 00 20 44',
    dato:today, oppstartsdato:'', leger:2, pkg:'komplett',
    honorarOvrstyr:'', spesielt:'', svarfrist:'1 måned', opptrapping:false, opptrappingPakke:'drift', opptrappingMnd:2,
  });
  const [tab, setTab] = useState('tilbud');
  const [brregStatus, setBrregStatus] = useState('');
  const [showMail, setShowMail] = useState(false); // '' | 'loading' | 'funnet' | 'feil'
  const upd = (k,v) => setS(p=>({...p,[k]:v}));

  useEffect(()=>{
    const clean = s.orgnr.replace(/\s/g,'');
    if(!/^\d{9}$/.test(clean)){ setBrregStatus(''); return; }
    setBrregStatus('loading');
    fetch(`https://data.brreg.no/enhetsregisteret/api/enheter/${clean}`)
      .then(r=>{ if(!r.ok) throw new Error('ikke funnet'); return r.json(); })
      .then(data=>{
        const adr = data.forretningsadresse;
        setS(p=>({
          ...p,
          kunde: data.navn ? data.navn.charAt(0)+data.navn.slice(1).toLowerCase() : p.kunde,
          adresse: adr?.adresse?.[0] || p.adresse,
          postnr: adr?.postnummer && adr?.poststed
            ? adr.postnummer+' '+adr.poststed.charAt(0)+adr.poststed.slice(1).toLowerCase()
            : p.postnr,
        }));
        setBrregStatus('funnet');
      })
      .catch(()=>setBrregStatus('feil'));
  },[s.orgnr]);

  useEffect(()=>{
    const el=document.createElement('style'); el.textContent=PRINT_CSS; document.head.appendChild(el);
    return ()=>document.head.removeChild(el);
  },[]);

  const printDoc = (type) => {
    const content = document.querySelector(`.${type}-view`);
    if (!content) return;
    const pw = window.open('', '_blank');
    if (!pw) { alert('Popup ble blokkert. Tillat popup for denne siden og prøv igjen.'); return; }
    const isTilbud = type === 'tilbud';
    const css = isTilbud ? `
      @page { size: A4 portrait; margin: 0; }
      *, *::before, *::after { -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; box-sizing:border-box; }
      body { margin:0; padding:0; background:white; font-family:system-ui,sans-serif; }
      .hkf-page { page-break-after:always!important; break-after:page!important; display:flex!important; flex-direction:column!important; width:210mm!important; height:297mm!important; overflow:hidden!important; background:white; box-shadow:none!important; }
      .hkf-page-flow { page-break-before:always!important; break-before:page!important; display:block!important; width:210mm!important; background:white; box-shadow:none!important; }
      .hkf-section { page-break-inside:avoid; break-inside:avoid; }
      .card-grid { display:grid!important; grid-template-columns:1fr 1fr!important; grid-template-rows:1fr 1fr!important; height:calc(297mm - 82mm - 14mm)!important; }
    ` : `
      @page { size: A4 portrait; margin: 18mm 20mm; }
      *, *::before, *::after { -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; box-sizing:border-box; }
      body { margin:0; padding:0; background:white; font-family:system-ui,sans-serif; }
      .hkf-kontrakt-wrap { width:100%!important; box-shadow:none!important; max-width:none!important; }
      .hkf-kontrakt-wrap > div { padding:0!important; }
      .k-page-break { page-break-before:always!important; break-before:page!important; padding-top:0!important; margin-top:0!important; }
      .k-avoid { page-break-inside:avoid; break-inside:avoid; }
      table { width:100%!important; }
    `;
    pw.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><style>' + css + '</style></head><body>' + content.innerHTML + '</body></html>');
    pw.document.close();
    pw.focus();
    // Sett tittel = filnavn slik at nettleseren foreslår dette ved «Lagre som PDF»
    const safeName = (s.kunde||'Tilbud').replace(/[^a-zA-Z0-9æøåÆØÅ\s\-]/g,'').trim().replace(/\s+/g,'_');
    const pakkeSuffix = isTilbud ? {'drift':'Drift','okonomi':'Okonomi','komplett':'Komplett'}[s.pkg]||'' : 'Kontrakt';
    const datoSuffix = s.dato ? s.dato.replace(/\./g,'-') : '';
    pw.document.title = [safeName, pakkeSuffix, datoSuffix].filter(Boolean).join('_');
    setTimeout(() => { pw.print(); pw.close(); }, 700);
  };

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:'#eceaf2'}}>
      <Panel s={s} upd={upd} tab={tab} setTab={setTab} printDoc={printDoc} brregStatus={brregStatus} showMail={showMail} setShowMail={setShowMail}/>
      <div className="doc-scroll" style={{flex:1,overflowY:'auto',padding:'20px 28px',display:'flex',flexDirection:'column',gap:16,alignItems:'center'}}>
        {/* Tab-knapper (skjerm) */}
        <div className="tab-bar no-print" style={{display:'flex',gap:8,alignSelf:'flex-start'}}>
          {['tilbud','kontrakt'].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{padding:'7px 18px',border:'none',borderRadius:7,
              background:tab===t?C.hero:'#fff',color:tab===t?'#fff':C.muted,fontWeight:700,fontSize:13,
              cursor:'pointer',fontFamily:'inherit',boxShadow:'0 1px 4px rgba(0,0,0,.08)'}}>
              {t==='tilbud'?'Tilbud':'Kontrakt'}
            </button>
          ))}
        </div>

        {/* Tilbudssider */}
        <div className="tilbud-view" style={{display:tab==='tilbud'?'flex':'none',flexDirection:'column',gap:16,alignItems:'center',width:'100%',boxSizing:'border-box'}}>
          <Page1 s={s}/>
          <Page2/>
          <Page3 s={s}/>
        </div>

        {/* Kontrakt */}
        <div className="kontrakt-view" style={{display:tab==='kontrakt'?'flex':'none',flexDirection:'column',gap:0,alignItems:'center',width:'100%'}}>
          <ContractDoc s={s}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
